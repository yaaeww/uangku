version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: keuangan-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-keuangan_keluarga}
    ports:
      - "5432:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keuangan-backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-keuangan_keluarga}
      JWT_SECRET: ${JWT_SECRET:-secret}
      # Add other necessary env vars here
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keuangan-frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
